# Render Blueprint for INTERNAL TESTING only.
#
# If your Render-connected repo root is the parent workspace, keep:
#   rootDir: ReadFlow/backend
# If your repo root is ReadFlow itself, use the top-level render.internal.yaml.
#
# WARNING: Do not use this for public release.
# It enables ENTITLEMENTS_DEV_OVERRIDE=true, so everyone is treated as paid.

services:
  - type: web
    name: readflow-backend-internal
    runtime: docker
    rootDir: ReadFlow/backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_KEY
        sync: false
      - key: RC_SECRET_KEY
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TTS_PROVIDER
        value: cloud
      - key: TTS_MODEL
        value: tts-1-hd
      - key: TTS_VOICE
        value: nova
      - key: OCR_ENABLED
        value: "true"
      - key: OCR_LANG
        value: eng
      - key: OCR_EAGER_PAGES
        value: "4"
      - key: ENTITLEMENTS_DEV_OVERRIDE
        value: "true"
      - key: DEV_DEFAULT_TIER
        value: ai_pro
      - key: ENTITLEMENTS_CACHE_MS
        value: "60000"
      - key: RATE_EXTRACT_PER_MIN
        value: "12"
      - key: RATE_AI_PER_MIN
        value: "20"
      - key: RATE_TTS_PER_MIN
        value: "180"
