# Render Blueprint for the ReadFlow backend.
#
# Place this file at the ROOT of the Git repo you connect to Render, then adjust
# `rootDir` below to wherever the backend lives in that repo:
#   - repo = the "aiChat" workspace  ->  rootDir: ReadFlow/backend
#   - repo = the "ReadFlow" folder    ->  rootDir: backend
#
# In Render: New + -> Blueprint -> pick your repo. It reads this file, builds the
# Docker image, and gives you an HTTPS URL like https://readflow-backend.onrender.com
#
# Set the secret env vars (OPENAI_API_KEY, APP_KEY) in the dashboard or when
# prompted (they are marked `sync: false` so they are never stored in git).
services:
  - type: web
    name: readflow-backend
    runtime: docker
    rootDir: ReadFlow/backend
    dockerfilePath: ./Dockerfile
    plan: starter # "free" also works but cold-starts after inactivity
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # --- secrets: set these in the Render dashboard (sync:false = not in git) ---
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_KEY # shared key the mobile app must send (x-app-key). Generate a random string.
        sync: false
      # --- AI / voice config ---
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TTS_PROVIDER
        value: cloud
      - key: TTS_MODEL
        value: tts-1-hd
      - key: TTS_VOICE
        value: nova
      # --- OCR ---
      - key: OCR_ENABLED
        value: "true"
      - key: OCR_LANG
        value: eng
      - key: OCR_EAGER_PAGES
        value: "4"
      # --- entitlements (free v1: everyone gets the standard features) ---
      - key: ENTITLEMENTS_DEV_OVERRIDE
        value: "true"
      - key: DEV_DEFAULT_TIER
        value: ai_pro
      # --- rate limits (protect the wallet) ---
      - key: RATE_EXTRACT_PER_MIN
        value: "12"
      - key: RATE_AI_PER_MIN
        value: "20"
      - key: RATE_TTS_PER_MIN
        value: "180"
