# Render Blueprint for the ReadFlow backend.
#
# Place this file at the ROOT of the Git repo you connect to Render, then adjust
# `rootDir` below to wherever the backend lives in that repo:
#   - repo = the "aiChat" workspace  ->  rootDir: ReadFlow/backend
#   - repo = the "ReadFlow" folder    ->  rootDir: backend
#
# In Render: New + -> Blueprint -> pick your repo. It reads this file, builds the
# Docker image, and gives you an HTTPS URL like https://readflow-backend.onrender.com
#
# FEATURE ENFORCEMENT:
#   AI access is gated by subscription tier (free tier cannot access /api/ai or /api/tts).
#
# This default file is PUBLIC-RELEASE SAFE:
#   - ENTITLEMENTS_DEV_OVERRIDE is disabled
#   - plan is starter (upgrade to standard if needed)
#
# For internal testing on Render Free, use backend/render.internal.yaml instead.
#
# Set the secret env vars in the Render dashboard (they are marked `sync: false`
# so they are never stored in git):
#   - OPENAI_API_KEY: Your OpenAI API key
#   - APP_KEY: Random secret the mobile app must send (x-app-key)
#   - RC_SECRET_KEY: RevenueCat production secret (for public release)
#
services:
  - type: web
    name: readflow-backend
    runtime: docker
    rootDir: ReadFlow/backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # --- secrets: set these in the Render dashboard (sync:false = not in git) ---
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_KEY
        sync: false
      - key: RC_SECRET_KEY
        sync: false
      # --- AI / voice config ---
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TTS_PROVIDER
        value: cloud
      - key: TTS_MODEL
        value: tts-1-hd
      - key: TTS_VOICE
        value: nova
      # --- OCR ---
      - key: OCR_ENABLED
        value: "true"
      - key: OCR_LANG
        value: eng
      - key: OCR_EAGER_PAGES
        value: "4"
      # --- entitlements (public-safe default) ---
      - key: ENTITLEMENTS_DEV_OVERRIDE
        value: "false"
      - key: DEV_DEFAULT_TIER
        value: free
      - key: ENTITLEMENTS_CACHE_MS
        value: "60000"
      # --- rate limits (protect the wallet) ---
      - key: RATE_EXTRACT_PER_MIN
        value: "12"
      - key: RATE_AI_PER_MIN
        value: "20"
      - key: RATE_TTS_PER_MIN
        value: "180"
